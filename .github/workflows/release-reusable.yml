# =============================================================================
# 재사용 가능한 릴리즈 워크플로우
#
# 목적:
#   - 호출한 워크플로우의 태그 기준으로 커스텀 릴리즈 노트를 생성
#   - 생성된 노트를 사용해 GitHub Release를 생성
#
# 입력:
#   - workflow_call로 전달된 실행 컨텍스트(github.ref, GITHUB_TOKEN 등)
#
# 출력:
#   - GitHub Release 생성
#   - RELEASE_NOTES.md를 기반으로 한 릴리즈 설명 등록
#
# 참고:
#   - 이 파일은 workflow_call 기반 reusable workflow임
#   - 실제 릴리즈 노트 생성 로직은 composite action에 위임함
# =============================================================================
name: Reusable Release

# =============================================================================
# 워크플로우 실행 조건
# - 다른 워크플로우에서 workflow_call로 호출될 때 실행
# - 필요 시 호출 측에서 runner 라벨을 입력값으로 전달 가능
# =============================================================================
on:
  workflow_call:
    inputs:
      runner:
        description: Runner label for release job
        required: false
        type: string
        default: ubuntu-22.04

# =============================================================================
# 권한 설정
# - contents: write
#   → GitHub Release 생성/수정에 필요한 권한
# =============================================================================
permissions:
  contents: write

jobs:
  release:
    # =========================================================================
    # 실행 환경
    # - 기본값은 ubuntu-22.04
    # - 호출한 워크플로우에서 runner 입력값으로 덮어쓸 수 있음
    # =========================================================================
    runs-on: ${{ inputs.runner }}

    steps:
      # =======================================================================
      # 1단계: 전체 Git 히스토리와 태그까지 체크아웃
      # - 이전 태그와 현재 태그를 비교하려면 shallow clone 이 아닌 전체 이력이 필요함
      # =======================================================================
      - name: Checkout source # Get full git history (전체 Git 히스토리 가져오기)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =======================================================================
      # 2단계: 현재 태그 이름 추출
      # - github.ref 예: refs/tags/v1.2.0
      # - 실제 태그명만 TAG_NAME 환경변수에 저장
      # =======================================================================
      - name: Set tag name # Extract tag name (태그 이름 추출)
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      # =======================================================================
      # 3단계: 커스텀 릴리즈 노트 생성
      # - 공용 composite action을 호출해 RELEASE_NOTES.md를 생성
      # - 릴리즈 노트 로직을 중앙화해 여러 저장소에서 동일 동작 보장
      # =======================================================================
      - name: Generate release notes
        uses: hhanoo/github-common/.github/actions/generate-release-notes@main
        with:
          tag_name: ${{ env.TAG_NAME }}

      # =======================================================================
      # 4단계: GitHub Release 생성
      # - GitHub CLI(gh)를 이용해 릴리즈 생성
      # - 생성한 RELEASE_NOTES.md를 설명으로 사용
      # - 태그에 -beta 또는 -rc가 들어가면 pre-release로 처리
      # =======================================================================
      - name: Create GitHub Release # Create GitHub Release (GitHub 릴리즈 생성)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${TAG_NAME}" == *"-beta"* || "${TAG_NAME}" == *"-rc"* ]]; then
            gh release create "${TAG_NAME}" \
              --title "${TAG_NAME}" \
              --notes-file RELEASE_NOTES.md \
              --prerelease
          else
            gh release create "${TAG_NAME}" \
              --title "${TAG_NAME}" \
              --notes-file RELEASE_NOTES.md
          fi
