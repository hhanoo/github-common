# =============================================================================
# 재사용 가능한 Docker 빌드/푸시 워크플로우
#
# 목적:
#   - 호출한 워크플로우에서 전달받은 이미지 목록을 매트릭스로 병렬 빌드/푸시
#   - Docker Hub에 이미지를 자동으로 배포
#
# 입력:
#   - images: 빌드할 이미지 정보 JSON 배열
#     예: [{"tag":"humble-desktop","repo":"hhanoo/ros","path":"ros/humble/desktop"}]
#   - runner: 실행 환경 (기본값: ubuntu-22.04)
#
# 시크릿:
#   - DOCKERHUB_USERNAME: Docker Hub 사용자명
#   - DOCKERHUB_TOKEN: Docker Hub 액세스 토큰
#
# 참고:
#   - 이 파일은 workflow_call 기반 reusable workflow임
#   - 빌드 컨텍스트는 각 이미지의 Dockerfile이 위치한 디렉토리
# =============================================================================
name: Reusable Docker Build

# =============================================================================
# 워크플로우 실행 조건
# - 다른 워크플로우에서 workflow_call로 호출될 때 실행
# - 빌드할 이미지 목록과 Docker Hub 인증 정보를 전달받음
# =============================================================================
on:
  workflow_call:
    inputs:
      images:
        description: >
          JSON array of images to build.
          Each element: {"tag": "...", "repo": "...", "path": "..."}
        required: true
        type: string
      runner:
        description: Runner label for build jobs
        required: false
        type: string
        default: ubuntu-22.04
    secrets:
      DOCKERHUB_USERNAME:
        description: Docker Hub username
        required: true
      DOCKERHUB_TOKEN:
        description: Docker Hub access token
        required: true

jobs:
  build:
    # =========================================================================
    # 실행 환경
    # - 기본값은 ubuntu-22.04
    # - 호출한 워크플로우에서 runner 입력값으로 덮어쓸 수 있음
    # =========================================================================
    runs-on: ${{ inputs.runner }}

    # =========================================================================
    # 매트릭스 전략
    # - 호출 측에서 전달한 이미지 목록을 매트릭스로 병렬 빌드
    # - 하나의 이미지 빌드 실패가 다른 빌드에 영향을 주지 않도록 fail-fast 비활성화
    # =========================================================================
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(inputs.images) }}

    steps:
      # =======================================================================
      # 1단계: 소스 코드 체크아웃
      # - 이전 태그와 현재 태그를 비교하려면 shallow clone 이 아닌 전체 이력이 필요함
      # =======================================================================
      - name: Checkout source # Get full git history (전체 Git 히스토리 가져오기)
        uses: actions/checkout@v4

      # =======================================================================
      # 2단계: Docker Buildx 설정
      # - 고급 빌드 기능(캐시 등)을 사용하기 위해 Buildx를 활성화
      # =======================================================================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # =======================================================================
      # 3단계: Docker Hub 로그인
      # - 시크릿으로 전달받은 인증 정보를 사용
      # =======================================================================
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # =======================================================================
      # 4단계: Docker 이미지 빌드 및 푸시
      # - 각 이미지의 path 디렉토리를 빌드 컨텍스트로 사용
      # - 레지스트리 캐시를 활용해 빌드 시간 단축
      # - provenance: false → 불필요한 attestation 비활성화 (디스크 절약)
      # =======================================================================
      - name: Build and push ${{ matrix.repo }}:${{ matrix.tag }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.path }}
          file: ${{ matrix.path }}/Dockerfile
          push: true
          tags: ${{ matrix.repo }}:${{ matrix.tag }}
          provenance: false
          cache-from: type=registry,ref=${{ matrix.repo }}:${{ matrix.tag }}
          cache-to: type=inline
