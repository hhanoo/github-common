# =============================================================================
# 릴리즈 노트 생성을 위한 Composite Action
#
# 목적:
#   - 태그 기준 commit subject를 분석해 RELEASE_NOTES.md 생성
#   - reusable workflow에서 공용으로 재사용 가능한 형태 제공
#
# 입력:
#   - tag_name (현재 릴리즈 태그)
#
# 출력:
#   - RELEASE_NOTES.md 파일 생성
#
# 참고:
#   - 실제 생성 로직은 generate_release_notes.sh에 구현
#   - action은 입력 전달과 실행 오케스트레이션 역할만 담당
# =============================================================================
name: Generate Release Notes

# =============================================================================
# GitHub UI에 표시되는 간단 설명
# =============================================================================
description: Generate RELEASE_NOTES.md from git commits

inputs:
  # ===========================================================================
  # 입력값: tag_name
  # - 현재 릴리즈 태그명
  # - 스크립트 내부에서 이전 태그 대비 변경 범위를 계산할 때 사용
  # ===========================================================================
  tag_name:
    description: Current release tag
    required: true

runs:
  # ===========================================================================
  # Composite action 실행 방식
  # - 여러 step을 하나의 action처럼 재사용 가능하게 구성
  # ===========================================================================
  using: composite

  steps:
    # =========================================================================
    # 1단계: 릴리즈 노트 생성 스크립트 실행
    # - 입력받은 tag_name을 TAG_NAME 환경변수로 전달
    # - github.action_path를 이용해 action 내부 스크립트를 안정적으로 참조
    # =========================================================================
    - name: Run release note generator
      shell: bash
      env:
        TAG_NAME: ${{ inputs.tag_name }} # 입력값을 스크립트 환경변수로 전달
      run: bash "${{ github.action_path }}/generate_release_notes.sh"
